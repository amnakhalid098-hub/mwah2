<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Field</title>

<style>
body{
margin:0;
padding:0;
font-family:'Comic Sans MS',cursive;
overflow:hidden;
height:100vh;
}

#game-wrapper{
position:relative;
width:100vw;
height:100vh;
background:url("flowerfield.png") center/cover no-repeat;
}

/* Instruction text */
#instruction{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:1.2rem;
color:pink;
text-shadow:1px 1px 3px black;
z-index:20;
pointer-events:none;
}

/* Invisible flowers */
.flower{
position:absolute;
cursor:pointer;
width:8%;
height:6%;
background:rgba(255,0,0,0);
border-radius:50%;
z-index:10;
}

/* Hint bubble */
#hint{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.9);
padding:12px 22px;
border-radius:25px;
font-size:1rem;
box-shadow:0 0 15px rgba(0,0,0,0.2);
z-index:100;
}

/* Inventory */
#inventory{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
display:none;
gap:10px;
z-index:20;
}

.slot{
width:40px;
height:40px;
background:rgba(0,0,0,0.5);
border:1px solid white;
color:white;
display:flex;
justify-content:center;
align-items:center;
border-radius:5px;
}

/* backpack button */
#invBtn{
position:fixed;
bottom:20px;
right:20px;
font-size:22px;
padding:10px 14px;
border:none;
border-radius:50%;
background:#ffb6d9;
cursor:pointer;
z-index:25;
display:none;
}
</style>
</head>
<body>

<div id="game-wrapper">
<div id="instruction"></div>
<div id="inventory"></div>
</div>

<div id="hint"></div>
<button id="invBtn">🎒</button>

<script>

/* flower positions */
const spots=[
[18,80],[35,85],[52,82],[78,88],
[12,72],[44,75],[68,71],[88,76],
[22,62],[41,60],[58,61],[75,64]
];

/* random correct */
let correctIndex=Math.floor(Math.random()*spots.length);

/* wrong messages */
const wrongTexts=[
"Oops… that flower is hiding its secret today!",
"Not quite… maybe another flower knows 🌸",
"Haha, this one’s shy! Try a different bloom 😏",
"Hmm… you’re close, but keep searching!",
"This petal isn’t talking… try someone else!",
"Nope! That one’s just for decoration 🌼",
"Almost… but the magic’s somewhere else ✨",
"Haha nope! Keep those eyes sharp 👀",
"Not this one… maybe the petals are whispering 💭",
"Flower tricked you! Try again 🌺"
];

/* inventory update */
function updateInventory(){
const inv=document.getElementById("inventory");
inv.innerHTML="";

for(let i=1;i<=7;i++){
const s=document.createElement("div");
s.className="slot";

if(localStorage.getItem("reward"+i)){
s.innerHTML="🌸";
}else{
s.innerHTML="🔒";
}

inv.appendChild(s);
}
}

/* wrong click */
function wrongFlower(){
const h=document.getElementById("hint");
h.innerText=wrongTexts[Math.floor(Math.random()*wrongTexts.length)];
h.style.display="block";
setTimeout(()=>h.style.display="none",2000);
}

/* correct click */
function correctFlower(){

localStorage.setItem("reward1","yes");

document.getElementById("invBtn").style.display="block";
updateInventory();

document.body.style.opacity=0;
document.body.style.transition="1s";

setTimeout(()=>{
window.location.href="reward1.html";
},1000);
}

/* typing effect */
function typeText(el,text){
let i=0;
el.innerHTML="";
const interval=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(interval);
},50);
}

/* load */
window.onload=()=>{

const wrapper=document.getElementById("game-wrapper");

/* create flowers */
spots.forEach((pos,i)=>{
const f=document.createElement("div");
f.className="flower";
f.style.left=pos[0]+"%";
f.style.top=pos[1]+"%";
f.onclick=(i===correctIndex)?correctFlower:wrongFlower;
wrapper.appendChild(f);
});

/* show inventory if already unlocked */
if(localStorage.getItem("reward1")){
document.getElementById("invBtn").style.display="block";
updateInventory();
}

/* toggle inventory */
document.getElementById("invBtn").onclick=()=>{
const inv=document.getElementById("inventory");
inv.style.display = inv.style.display==="flex" ? "none" : "flex";
};

/* instruction text */
typeText(
document.getElementById("instruction"),
"Find the hidden symbol among the flowers… Some flowers are tricky… keep your eyes open 🌿"
);

};
</script>

</body>
</html>
