<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final Treasure</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#666;
  font-family:Georgia, serif;
  overflow:hidden;
}

/* CENTER LIGHT */
body::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center,
      rgba(255,255,255,0.35) 0%,
      rgba(255,255,255,0.15) 25%,
      rgba(0,0,0,0.75) 75%);
  pointer-events:none;
}

#scene{
  position:relative;
  z-index:2;
  text-align:center;
}

/* FLOAT */
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* SCROLL CLOSED */
#scrollClosed{
  width:170px;
  cursor:pointer;
  animation:float 3s ease-in-out infinite;
}

/* SCROLL OPEN */
#scrollOpen{
  display:none;
  background:#efe3c2;
  color:#2a1a0f;
  padding:40px;
  width:420px;
  max-height:70vh;
  overflow-y:auto;
  border-radius:6px;
  box-shadow:0 0 40px rgba(0,0,0,.35);
  text-align:left;
  line-height:1.6;
  animation:unroll 1s ease forwards;
}

@keyframes unroll{
  from{transform:scaleY(.1);opacity:0}
  to{transform:scaleY(1);opacity:1}
}

/* CHEST */
#chest{
  display:none;
  width:170px;
  cursor:pointer;
  animation:float 3s ease-in-out infinite;
}

/* ENVELOPE */
#envelope{
  display:none;
  width:240px;
  cursor:pointer;
  animation:float 3s ease-in-out infinite;
}

/* BUTTON */
.btn{
  margin-top:25px;
  padding:12px 28px;
  border:none;
  background:#111;
  color:#eee;
  border-radius:25px;
  cursor:pointer;
}

/* fade transition */
#fade{
  position:fixed;
  inset:0;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:opacity 1.5s ease;
  z-index:10;
}
</style>
</head>
<body>

<div id="scene">

<img id="scrollClosed" src="scroll_closed.png">
<div id="scrollOpen"></div>

<img id="chest" src="chest.png">
<img id="envelope" src="envelope.png">

</div>

<div id="fade"></div>

<script>
const scrollClosed=document.getElementById("scrollClosed")
const scrollOpen=document.getElementById("scrollOpen")
const chest=document.getElementById("chest")
const envelope=document.getElementById("envelope")
const fade=document.getElementById("fade")

/* OPEN SCROLL */
scrollClosed.onclick=()=>{
  scrollClosed.style.display="none"
  scrollOpen.style.display="block"

scrollOpen.innerHTML=`
<h2 style="text-align:center">📜 Final Decree</h2>
To the One Who Endured,
The trials were not meant to be passed. The doors were not meant to open. The House was not meant to yield.
Yet you walked where silence watches. You answered where echoes listen. You remained where shadows test.
The halls remember your steps. The walls remember your voice. The dark remembers your name.
You were not guided here. You were recognized.

<center><button class="btn" id="continueBtn">Proceed</button></center>
`

document.getElementById("continueBtn").onclick=()=>{
scrollOpen.style.display="none"
chest.style.display="block"
}
}

/* CHEST CLICK → ENVELOPE */
chest.onclick=()=>{
  chest.style.display="none"
  envelope.style.display="block"
}

/* CLICK ONLY SEAL */
envelope.onclick=(e)=>{
  const y=e.offsetY
  if(y>85 && y<155){
    fade.style.opacity="1"
    setTimeout(()=>{
      window.location.href="letter.html"
    },1400)
  }
}
</script>

</body>
</html>
